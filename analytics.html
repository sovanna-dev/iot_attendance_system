<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Analytics - IoT System</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .stat-number {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .stat-label {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .stat-card .stat-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .chart-card h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* Table */
        .table-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow-x: auto;
        }

        .table-card h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            background: rgba(102, 126, 234, 0.3);
            font-size: 13px;
            font-weight: 600;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-present {
            background: rgba(40, 167, 69, 0.3);
            color: #5eff6e;
        }

        .refresh-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-refresh:hover {
            transform: scale(1.05);
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Attendance Analytics</h1>
            <p>IoT RFID System • Real-Time Data</p>
        </div>

        <!-- Refresh Bar -->
        <div class="refresh-bar">
            <span><span class="live-dot"></span> Live Data</span>
            <button class="btn btn-refresh" onclick="loadAllData()">🔄 Refresh Data</button>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">Today's Attendance</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📆</div>
                <div class="stat-number" id="statWeek">0</div>
                <div class="stat-label">This Week</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-number" id="statMonth">0</div>
                <div class="stat-label">This Month</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total Records</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card">
                <h3>📈 Last 7 Days Attendance</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>🍩 Student Attendance Distribution</h3>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Recent Records Table -->
        <div class="table-card">
            <h3>📋 Recent Attendance Records</h3>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Student Name</th>
                        <th>Student ID</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recordsTable">
                    <tr><td colspan="6" style="text-align:center;opacity:0.6;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            databaseURL: "https://attendance-system-esp32-c6ed2-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================
        // LOAD ALL DATA
        // ============================================
        function loadAllData() {
            database.ref('attendance').once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) {
                    showEmptyState();
                    return;
                }
                processData(data);
            }).catch(error => {
                console.error('Error:', error);
            });
        }

        // ============================================
        // PROCESS DATA
        // ============================================
        let trendChartInstance = null;
        let pieChartInstance = null;

        function processData(data) {
            let allRecords = [];
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            // Collect all records
            for (let date in data) {
                for (let id in data[date]) {
                    const record = data[date][id];
                    if (record.name) {
                        allRecords.push({
                            ...record,
                            recordDate: date,
                            recordTime: record.time || id
                        });
                    }
                }
            }

            // Sort newest first
            allRecords.sort((a, b) => {
                if (a.recordDate !== b.recordDate) return b.recordDate.localeCompare(a.recordDate);
                return b.recordTime.localeCompare(a.recordTime);
            });

            // Calculate stats
            let todayCount = 0;
            let weekCount = 0;
            let monthCount = 0;
            
            const weekAgo = new Date(today);
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];
            
            const monthAgo = new Date(today);
            monthAgo.setDate(monthAgo.getDate() - 30);
            const monthAgoStr = monthAgo.toISOString().split('T')[0];

            // Student counts for pie chart
            let studentCounts = {};
            
            // Daily counts for trend chart
            let dailyCounts = {};
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                dailyCounts[d.toISOString().split('T')[0]] = 0;
            }

            allRecords.forEach(record => {
                if (record.recordDate === todayStr) todayCount++;
                if (record.recordDate >= weekAgoStr) weekCount++;
                if (record.recordDate >= monthAgoStr) monthCount++;
                
                // Count per student
                const name = record.name || 'Unknown';
                studentCounts[name] = (studentCounts[name] || 0) + 1;
                
                // Count per day for trend
                if (dailyCounts[record.recordDate] !== undefined) {
                    dailyCounts[record.recordDate]++;
                }
            });

            // Update stats
            document.getElementById('statToday').textContent = todayCount;
            document.getElementById('statWeek').textContent = weekCount;
            document.getElementById('statMonth').textContent = monthCount;
            document.getElementById('statTotal').textContent = allRecords.length;

            // Create trend chart
            createTrendChart(dailyCounts);
            
            // Create pie chart
            createPieChart(studentCounts);
            
            // Update table
            updateRecordsTable(allRecords.slice(0, 20)); // Show last 20
        }

        // ============================================
        // TREND CHART (Last 7 Days)
        // ============================================
        function createTrendChart(dailyCounts) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (trendChartInstance) {
                trendChartInstance.destroy();
            }
            
            const labels = Object.keys(dailyCounts).map(d => {
                const date = new Date(d);
                return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            });
            
            const values = Object.values(dailyCounts);
            
            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Attendance Count',
                        data: values,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: 'white' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.7)', font: { size: 11 } },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { 
                                color: 'rgba(255,255,255,0.7)', 
                                font: { size: 11 },
                                stepSize: 1,
                                beginAtZero: true
                            },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        // ============================================
        // PIE CHART (Student Distribution)
        // ============================================
        function createPieChart(studentCounts) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            
            if (pieChartInstance) {
                pieChartInstance.destroy();
            }
            
            const names = Object.keys(studentCounts);
            const counts = Object.values(studentCounts);
            
            const colors = [
                '#667eea', '#764ba2', '#f093fb', '#4facfe',
                '#43e97b', '#fa709a', '#fee140', '#30cfd0'
            ];
            
            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: names,
                    datasets: [{
                        data: counts,
                        backgroundColor: colors.slice(0, names.length),
                        borderColor: 'rgba(0,0,0,0.3)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { 
                                color: 'white',
                                padding: 15,
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
        }

        // ============================================
        // RECORDS TABLE
        // ============================================
        function updateRecordsTable(records) {
            const table = document.getElementById('recordsTable');
            
            if (records.length === 0) {
                table.innerHTML = '<tr><td colspan="6" style="text-align:center;opacity:0.6;">No records yet</td></tr>';
                return;
            }
            
            table.innerHTML = records.map((r, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${r.name || 'Unknown'}</strong></td>
                    <td>${r.studentID || '-'}</td>
                    <td>${r.recordDate}</td>
                    <td>${r.recordTime}</td>
                    <td><span class="badge badge-present">✅ Present</span></td>
                </tr>
            `).join('');
        }

        function showEmptyState() {
            document.getElementById('statToday').textContent = '0';
            document.getElementById('statWeek').textContent = '0';
            document.getElementById('statMonth').textContent = '0';
            document.getElementById('statTotal').textContent = '0';
            document.getElementById('recordsTable').innerHTML = '<tr><td colspan="6" style="text-align:center;opacity:0.6;">📭 No attendance records yet</td></tr>';
        }

        // ============================================
        // INITIAL LOAD
        // ============================================
        loadAllData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadAllData, 30000);
        
        console.log('📊 Analytics Dashboard Ready!');
    </script>
</body>
</html>
